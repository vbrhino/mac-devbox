name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since ${LATEST_TAG}"
            exit 0
          fi

          BUMP=""
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:|BREAKING CHANGE'; then
              BUMP="major"; break
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              [ -z "$BUMP" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ -z "$BUMP" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No conventional commits found — skipping release"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: ${BUMP} → ${NEW_TAG}"

          {
            echo "changelog<<CHANGELOG_EOF"
            while IFS= read -r msg; do echo "- ${msg}"; done <<< "$COMMITS"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Build release artifact
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "${{ steps.version.outputs.new_tag }}" > .version
          tar czf /tmp/mac-devbox.tar.gz \
            --transform "s,^\.,mac-devbox," \
            --exclude='.git' \
            --exclude='.github' \
            .

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.new_tag }}" \
            /tmp/mac-devbox.tar.gz \
            --title "${{ steps.version.outputs.new_tag }}" \
            --notes "${{ steps.version.outputs.changelog }}"
