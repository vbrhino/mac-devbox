name: Update Dependencies

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake inputs
        run: nix flake update

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet flake.lock 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No updates available"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Updates found:"
            git diff --stat flake.lock
          fi

      - name: Validate flake
        if: steps.diff.outputs.changed == 'true'
        run: |
          nix flake check
          nix build .#homeConfigurations.default.activationPackage --dry-run

      - name: Create Pull Request
        id: pr
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update nix flake inputs"
          title: "chore: update nix flake inputs"
          body: |
            Automated weekly update of Nix flake inputs (nixpkgs, home-manager).

            ## Checks performed
            - [x] `nix flake check` passed
            - [x] `nix build .#homeConfigurations.default.activationPackage --dry-run` evaluated successfully

            ---
            *Created automatically by the weekly dependency update workflow.*
          branch: deps/nix-flake-update
          delete-branch: true
          labels: dependencies

      - name: Request Copilot review
        if: steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ steps.pr.outputs.pull-request-number }} \
            --repo "${{ github.repository }}" \
            --add-reviewer "copilot"
